<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModernTech | Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container container">
            <a href="index.html" class="brand">
                <i class="fas fa-bolt text-primary"></i> ModernTech
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Shop</a></li>
                <li><a href="#">Categories</a></li>
                <li><a href="#">About</a></li>
            </ul>
            <div class="nav-cart">
                <a href="cart.html" class="cart-btn">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="hero">
            <h1>Discover Premium Tech</h1>
            <p>Enhance your lifestyle with cutting-edge devices designed for the modern world.</p>
        </section>

        <h2 class="section-title">Featured Products</h2>
        <div id="product-grid" class="product-grid">
            <p class="text-light text-center" style="grid-column: 1 / -1; padding: 3rem;">
                <i class="fas fa-spinner fa-spin fa-2x mb-3"></i><br>
                Loading amazing products...
            </p>
        </div>
    </main>

    <footer class="footer">
        <div class="container text-center">
            <p>&copy; 2026 ModernTech. Built with pure HTML/JS + PHP APIs.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
